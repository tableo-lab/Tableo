<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <style>
      .logo-text { font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif; font-weight: 900; font-size: 62px; fill: #1a1a1a; }
    </style>
  </defs>
  <!-- Grid Icon -->
  <rect x="4" y="8" width="80" height="80" rx="14" ry="14" fill="none" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Top-left: Orange -->
  <rect x="14" y="18" width="28" height="28" rx="5" ry="5" fill="#FF6B00"/>
  <!-- Top-right: White with border -->
  <rect x="50" y="18" width="28" height="28" rx="5" ry="5" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Bottom-left: Grey -->
  <rect x="14" y="54" width="28" height="28" rx="5" ry="5" fill="#cccccc"/>
  <!-- Bottom-right: Dark -->
  <rect x="50" y="54" width="28" height="28" rx="5" ry="5" fill="#1a1a1a"/>
  <!-- Text -->
  <text x="100" y="72" class="logo-text">tableo</text>
  <!-- Orange dot -->
  <circle cx="358" cy="68" r="7" fill="#FF6B00"/>
</svg>
